            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }

        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #e9c349;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px 2px rgba(233, 195, 73, 0.6);
            animation: drift 10s linear infinite, glow 2s ease-in-out infinite alternate;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(calc(100vw * var(--dx)), calc(100vh * var(--dy))); opacity: 0; }

            0% { opacity: 0.3; transform: scale(0.8); }

<canvas id="shader-canvas-ANIMATION_3" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_3');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

// Simple hash function for noise
float hash(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

void main() {
    vec2 uv = v_texCoord;
    vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.y, u_resolution.x);
    
    // Deep Space Gradient
    vec3 color = mix(vec3(0.043, 0.067, 0.129), vec3(0.02, 0.02, 0.05), uv.y);
    
    // Twinkling Stars
    float stars = 0.0;
    for(float i = 0.0; i < 3.0; i++) {
        vec2 grid = floor(p * (20.0 + i * 15.0));
        vec2 f = fract(p * (20.0 + i * 15.0)) - 0.5;
        float h = hash(grid);
        if(h > 0.98) {
            float twinkle = sin(u_time * 2.0 + h * 6.28) * 0.5 + 0.5;
            float dist = length(f);
            stars += (0.01 / dist) * twinkle;
        }
    }
    color += stars * vec3(0.9, 0.95, 1.0);
    
    // Shooting Star logic
    float ssTime = mod(u_time * 0.4, 10.0);
    if(ssTime < 1.0) {
        vec2 ssPos = vec2(-1.0 + ssTime * 2.0, 0.5 - ssTime * 0.5);
        float d = length(p - ssPos);
        float tail = smoothstep(0.1, 0.0, d);
        color += tail * vec3(1.0, 0.9, 0.7);
    }

    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<div class="absolute inset-0 w-full h-full pointer-events-auto opacity-0 transition-opacity duration-3000" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_4" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_4');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const scene = new THREE.Scene();
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;
const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404040, 2); 
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xffd700, 1, 100);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// The Floating Island (Abstract Representation)
const islandGroup = new THREE.THREE.Group();

// Main Base (Low poly rock/earth)
const baseGeo = new THREE.SphereGeometry(2, 8, 6);
const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, flatShading: true });
const base = new THREE.Mesh(baseGeo, baseMat);
base.scale.set(1.5, 0.6, 1.5);
base.position.y = -0.5;
islandGroup.add(base);

// Surface (Grass/Plateau)
const surfaceGeo = new THREE.CylinderGeometry(2.5, 2.5, 0.2, 12);
const surfaceMat = new THREE.MeshStandardMaterial({ color: 0x2d3436 });
const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
surface.position.y = 0;
islandGroup.add(surface);

// A simple tree silhouette
const trunkGeo = new THREE.CylinderGeometry(0.1, 0.15, 1);
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f });
const trunk = new THREE.Mesh(trunkGeo, trunkMat);
trunk.position.set(-1, 0.5, -0.5);
islandGroup.add(trunk);

const foliageGeo = new THREE.SphereGeometry(0.6, 8, 8);
const foliageMat = new THREE.MeshStandardMaterial({ color: 0xdb7093 }); // Cherry Blossom Pink
const foliage = new THREE.Mesh(foliageGeo, foliageMat);
foliage.position.set(-1, 1.1, -0.5);
islandGroup.add(foliage);

// A tiny glowing lantern
const lanternGeo = new THREE.SphereGeometry(0.1, 8, 8);
const lanternMat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
const lantern = new THREE.Mesh(lanternGeo, lanternMat);
lantern.position.set(1, 0.8, 1);
islandGroup.add(lantern);

scene.add(islandGroup);
camera.position.z = 8;
camera.position.y = 2;
camera.lookAt(0,0,0);

// Animation Loop
function animate() {
    requestAnimationFrame(animate);
    islandGroup.rotation.y += 0.005;
    islandGroup.position.y = Math.sin(Date.now() * 0.001) * 0.2; // Gentle floating motion
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});
})();
</script>

<script>
        function transitionToScreen2() {
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            const islandScene = document.getElementById('island-scene');

            // Fade out Screen 1
            s1.classList.remove('active-screen');
            s1.classList.add('hidden-screen');

            // Fade in Screen 2
            setTimeout(() => {
                s2.classList.remove('hidden-screen');
                s2.classList.add('active-screen');
                
                // Fade in 3D scene smoothly
                if(islandScene) {
                    islandScene.style.opacity = '1';
                }

                initFireflies();
            }, 1000);
        }

        function initFireflies() {
            const container = document.getElementById('screen2');
            const numFireflies = 30;

            for (let i = 0; i < numFireflies; i++) {
                createFirefly(container);
            }
        }

        function createFirefly(container) {
            const firefly = document.createElement('div');
            firefly.classList.add('firefly');
            
            // Random start position
            firefly.style.left = `${Math.random() * 100}vw`;
            firefly.style.top = `${Math.random() * 100}vh`;

            // Random movement vectors
            const dx = (Math.random() - 0.5) * 2;
            const dy = (Math.random() - 0.5) * 2;
            firefly.style.setProperty('--dx', dx);
            firefly.style.setProperty('--dy', dy);

            // Randomize animation delays and durations to look organic
            firefly.style.animationDelay = `${Math.random() * 5}s, ${Math.random() * 2}s`;
            firefly.style.animationDuration = `${10 + Math.random() * 20}s, ${1 + Math.random() * 2}s`;

            container.appendChild(firefly);

            // Recreate when animation ends to keep them going
            firefly.addEventListener('animationiteration', () => {
                 if(event.animationName === 'drift') {
                    firefly.style.left = `${Math.random() * 100}vw`;
                    firefly.style.top = `${Math.random() * 100}vh`;
                 }
            });
        }
    </script>
