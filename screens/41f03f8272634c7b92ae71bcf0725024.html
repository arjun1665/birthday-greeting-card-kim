<!-- Deep Space Nebula Shader Background -->
<!-- STITCH_SHADER_START:ANIMATION_6 class="absolute inset-0 w-full h-full z-0 pointer-events-none" -->
<div class="absolute inset-0 w-full h-full z-0 pointer-events-none" style="display:block;">
<canvas id="shader-canvas-ANIMATION_6" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_6');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

float hash(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

void main() {
    vec2 uv = v_texCoord;
    vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.y, u_resolution.x);
    
    // Deep Space Nebula
    float n = noise(p * 0.5 + u_time * 0.05);
    float n2 = noise(p * 0.8 - u_time * 0.03);
    
    vec3 color1 = vec3(0.02, 0.03, 0.1); // Deep Navy
    vec3 color2 = vec3(0.05, 0.02, 0.08); // Deep Purple
    vec3 color3 = vec3(0.0, 0.05, 0.07); // Dark Cyan
    
    vec3 finalColor = mix(color1, color2, n);
    finalColor = mix(finalColor, color3, n2 * 0.5);
    
    // Distant star field
    float stars = pow(hash(p * 150.0), 50.0) * 0.8;
    stars += pow(hash(p * 100.0 + 10.0), 60.0) * 0.5;
    
    // Twinkle
    float twinkle = sin(u_time * 1.5 + hash(floor(p * 100.0)) * 10.0) * 0.5 + 0.5;
    finalColor += stars * twinkle;
    
    // Subtle vignette
    float vignette = 1.0 - length(uv - 0.5) * 0.7;
    finalColor *= vignette;

    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<!-- Interactive Constellation Map -->
<!-- STITCH_THREEJS_START:ANIMATION_7 class="absolute inset-0 w-full h-full z-10 cursor-crosshair" -->
<div class="absolute inset-0 w-full h-full z-10 cursor-crosshair" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_7" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_7');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-ANIMATION_4') || document.body;
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;
  
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  camera.position.z = 10;
  
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Constellation Data
  const constellations = [
    { 
      name: 'The Smile Maker', 
      points: [[-2, 2, 0], [-1, 3, 0], [1, 3, 0], [2, 2, 0], [1, 1, 0], [-1, 1, 0]],
      message: 'You make people smile just by being you.'
    },
    { 
      name: 'The Memory Keeper', 
      points: [[3, -1, 0], [4, 0, 0], [3, 1, 0], [2, 0, 0], [3, -1, 0]],
      message: 'You make ordinary days memorable.'
    },
    { 
      name: 'The Inner Strength', 
      points: [[-3, -2, 0], [-4, -1, 0], [-3, 0, 0], [-2, -1, 0], [-3, -2, 0]],
      message: 'You are stronger than you realize.'
    }
  ];

  const starGroup = new THREE.Group();
  const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.3 });

  const interactiveStars = [];

  constellations.forEach((c, index) => {
    const group = new THREE.Group();
    const points = c.points.map(p => new THREE.Vector3(...p));
    
    // Add stars at points
    points.forEach(p => {
      const starGeo = new THREE.SphereGeometry(0.08, 8, 8);
      const star = new THREE.Mesh(starGeo, starMaterial.clone());
      star.position.copy(p);
      star.userData = { constellation: c.name, message: c.message };
      group.add(star);
      interactiveStars.push(star);
    });

    // Add connecting lines
    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(lineGeo, lineMaterial);
    group.add(line);
    
    starGroup.add(group);
  });

  scene.add(starGroup);

  // Interaction
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  window.addEventListener('mousemove', (event) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  });

  window.addEventListener('click', () => {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(interactiveStars);
    if (intersects.length > 0) {
      const star = intersects[0].object;
      const event = new CustomEvent('constellation-clicked', { 
        detail: { name: star.userData.constellation, message: star.userData.message } 
      });
      window.dispatchEvent(event);
      
      // Visual feedback
      star.scale.set(2, 2, 2);
      star.material.color.set(0xffd700);
      setTimeout(() => {
        star.scale.set(1, 1, 1);
        star.material.color.set(0xffffff);
      }, 500);
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    starGroup.rotation.y += 0.001;
    starGroup.rotation.x += 0.0005;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
})();
</script>
</div>

<div class="absolute top-4 left-4 w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.8)]"></div>
<div class="absolute top-4 right-4 w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.8)]"></div>
<div class="absolute bottom-4 left-4 w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.8)]"></div>
<div class="absolute bottom-4 right-4 w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.8)]"></div>
<span class="material-symbols-outlined text-secondary text-4xl mb-4 opacity-80" style="font-variation-settings: 'FILL' 0;">auto_awesome</span>
<h2 class="font-headline-md text-tertiary mb-3" id="constellation-title">Constellation Name</h2>
<p class="font-body-md text-on-surface/90 leading-relaxed italic" id="constellation-message">The message will appear here when a star is clicked.</p>
<button class="mt-6 font-label-caps text-outline hover:text-primary transition-colors tracking-widest text-[10px] uppercase" id="close-panel">Close</button>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const panel = document.getElementById('message-panel');
            const titleEl = document.getElementById('constellation-title');
            const msgEl = document.getElementById('constellation-message');
            const closeBtn = document.getElementById('close-panel');

            // Listen for the custom event from Three.js scene
            window.addEventListener('constellation-clicked', (event) => {
                const detail = event.detail || {};
                const name = detail.name || 'Unknown Star Cluster';
                const message = detail.message || 'A silent whisper from the cosmos.';
                
                titleEl.textContent = name;
                msgEl.textContent = message;
                
                panel.classList.add('visible');
                createStarDust(event.detail.x || window.innerWidth/2, event.detail.y || window.innerHeight/2);
            });

            closeBtn.addEventListener('click', () => {
                panel.classList.remove('visible');
            });

            // Fallback interaction for testing if event isn't firing
            document.body.addEventListener('dblclick', (e) => {
                const mockEvent = new CustomEvent('constellation-clicked', {
                    detail: {
                        name: 'Lyra\'s Song',
                        message: 'Wishing you a universe of happiness on your special day.',
                        x: e.clientX,
                        y: e.clientY
                    }
                });
                window.dispatchEvent(mockEvent);
            });

            function createStarDust(x, y) {
                for(let i=0; i<10; i++) {
                    const dust = document.createElement('div');
                    dust.className = 'star-dust';
                    dust.style.left = (x + (Math.random() * 40 - 20)) + 'px';
                    dust.style.top = (y + (Math.random() * 40 - 20)) + 'px';
                    dust.style.animationDelay = (Math.random() * 2) + 's';
                    document.body.appendChild(dust);
                    
                    setTimeout(() => {
                        dust.remove();
                    }, 3000);
                }
            }
        });
    </script>
