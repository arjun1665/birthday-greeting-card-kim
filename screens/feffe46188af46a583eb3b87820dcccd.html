<canvas id="shader-canvas-ANIMATION_16" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_16');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

float hash(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
               mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
}

void main() {
    vec2 uv = v_texCoord;
    vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.y, u_resolution.x);
    
    // Deep water colors
    vec3 color1 = vec3(0.02, 0.05, 0.12); // Midnight blue
    vec3 color2 = vec3(0.05, 0.1, 0.2);  // Soft cyan reflection
    
    float n = noise(p * 2.0 + u_time * 0.1);
    float ripples = sin(p.x * 10.0 + n * 5.0 + u_time) * 0.5 + 0.5;
    ripples *= sin(p.y * 8.0 - u_time * 0.5) * 0.5 + 0.5;
    
    vec3 finalColor = mix(color1, color2, ripples * 0.3);
    
    // Twinkling reflections
    float stars = pow(hash(p + u_time * 0.001), 100.0) * 0.8;
    finalColor += stars * vec3(0.8, 0.9, 1.0);
    
    // Vignette
    float d = length(uv - 0.5);
    finalColor *= smoothstep(0.8, 0.2, d);

    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<!-- STITCH_THREEJS_START:ANIMATION_15 class="absolute inset-0 w-full h-full pointer-events-auto" -->
<div class="absolute inset-0 w-full h-full pointer-events-auto" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_15" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_15');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;
  
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  camera.position.set(0, 5, 15);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0xffd700, 1, 50);
  pointLight.position.set(0, 10, 0);
  scene.add(pointLight);

  // Floating Boats
  const boatGroup = new THREE.Group();
  const boatCount = 5;
  
  function createBoat() {
    const group = new THREE.Group();
    // Simple Paper Boat
    const bodyGeo = new THREE.ConeGeometry(0.5, 1, 4);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, flatShading: true });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.x = Math.PI;
    body.scale.set(1, 0.5, 2);
    group.add(body);
    
    // Lantern on boat
    const lanternGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const lanternMat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
    const lantern = new THREE.Mesh(lanternGeo, lanternMat);
    lantern.position.y = 0.5;
    group.add(lantern);
    
    return group;
  }

  for(let i=0; i<boatCount; i++) {
    const boat = createBoat();
    boat.position.set((Math.random()-0.5)*10, 0, (Math.random()-0.5)*10);
    boat.userData = { 
      speed: 0.005 + Math.random()*0.01,
      phase: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.01
    };
    boatGroup.add(boat);
  }
  scene.add(boatGroup);

  function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;
    
    boatGroup.children.forEach(b => {
      b.position.y = Math.sin(time + b.userData.phase) * 0.1;
      b.rotation.z = Math.sin(time * 0.5 + b.userData.phase) * 0.05;
      b.position.x += Math.cos(time * 0.2 + b.userData.phase) * 0.01;
      b.rotation.y += b.userData.rotSpeed;
    });
    
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
})();
</script>

</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const maxStars = 5;
            let currentStars = 0;
            const starCountEl = document.getElementById('star-count');
            const hudEl = document.getElementById('star-hud');
            const hitboxes = document.querySelectorAll('.boat-hitbox');

            hitboxes.forEach(hitbox => {
                hitbox.addEventListener('click', (e) => {
                    if (hitbox.dataset.collected === "true" || currentStars >= maxStars) return;
                    
                    hitbox.dataset.collected = "true";
                    
                    // Create flying star
                    const star = document.createElement('span');
                    star.className = 'material-symbols-outlined star-fly-animation';
                    star.style.fontVariationSettings = "'FILL' 1";
                    star.textContent = 'stars';
                    
                    // Start position (click coordinates)
                    const startX = e.clientX;
                    const startY = e.clientY;
                    
                    star.style.left = `${startX}px`;
                    star.style.top = `${startY}px`;
                    
                    document.body.appendChild(star);
                    
                    // Force reflow
                    star.getBoundingClientRect();
                    
                    // End position (HUD center)
                    const hudRect = hudEl.getBoundingClientRect();
                    const endX = hudRect.left + (hudRect.width / 2);
                    const endY = hudRect.top + (hudRect.height / 2);
                    
                    // Animate
                    requestAnimationFrame(() => {
                        star.style.transform = `translate(${endX - startX}px, ${endY - startY}px) scale(0.5) rotate(360deg)`;
                        star.style.opacity = '0';
                    });
                    
                    // Update counter and cleanup
                    setTimeout(() => {
                        star.remove();
                        currentStars++;
                        starCountEl.textContent = currentStars;
                        
                        // HUD pulse effect
                        hudEl.classList.add('scale-110', 'bg-tertiary-fixed/10');
                        setTimeout(() => {
                            hudEl.classList.remove('scale-110', 'bg-tertiary-fixed/10');
                        }, 200);

                        if (currentStars === maxStars) {
                            // Completion effect
                            setTimeout(() => {
                                alert("All starlight gathered. A new constellation is born.");
                            }, 500);
                        }
                    }, 1000); // match transition duration
                });
            });
        });
    </script>
