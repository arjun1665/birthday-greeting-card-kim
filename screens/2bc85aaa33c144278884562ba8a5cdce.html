                        "surface-container-lowest": "#0c0f0f",

<style>
        body { margin: 0; overflow: hidden; background-color: #121414; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(32px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glow-button {
            transition: all 0.5s ease;
        }
        .glow-button:hover {
            box-shadow: inset 0 0 20px rgba(210, 187, 255, 0.5);
            border-color: rgba(210, 187, 255, 0.8);
        }
        
        #message-panel {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out, transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
        }
        
        #message-panel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .star-dust {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: float 3s linear infinite, fade 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }
        @keyframes fade {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="text-on-background h-screen w-screen relative">
<!-- Deep Space Nebula Shader Background -->

<!-- Interactive Constellation Map -->

<!-- Top Navigation / Back Button & HUD -->
<div class="fixed top-0 left-0 w-full z-20 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-8">
<button class="glow-button flex items-center gap-2 px-6 py-3 rounded-full border border-white/20 bg-surface/10 backdrop-blur-md text-primary font-label-caps group">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform duration-300">arrow_back</span>
            Back to Island
        </button>
<!-- Star Collection HUD -->
<div class="flex items-center gap-3 px-5 py-2 rounded-full border border-tertiary/30 bg-surface/20 backdrop-blur-md shadow-[0_0_15px_rgba(233,195,73,0.15)]">
<span class="material-symbols-outlined text-tertiary drop-shadow-[0_0_8px_rgba(233,195,73,0.8)]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-caps text-on-surface text-lg font-bold" id="star-counter">0</span>
</div>
</div>
<!-- Toast Notification -->
<div class="fixed top-24 right-margin-mobile md:right-margin-desktop z-40 opacity-0 pointer-events-none transition-all duration-500 transform translate-y-4" id="toast-notification">
<div class="flex items-center gap-3 px-4 py-3 rounded-lg border border-tertiary/40 bg-surface/60 backdrop-blur-xl shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
<span class="material-symbols-outlined text-tertiary text-sm" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-body-md text-on-surface text-sm">Star Collected!</span>
</div>
</div>
<!-- Title & Subtitle -->
<div class="fixed top-1/4 left-0 w-full z-20 pointer-events-none text-center px-gutter">
<h1 class="font-display-story-mobile md:font-display-story text-on-surface mb-2 tracking-[0.2em] font-light drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">Kim's Observatory</h1>
<p class="font-body-md text-secondary/80 font-light tracking-wider">Discover the stars to reveal hidden whispers.</p>
</div>
<!-- Floating Glassmorphism Panel (Hidden initially) -->
<div class="fixed bottom-margin-mobile md:bottom-margin-desktop left-1/2 -translate-x-1/2 z-30 w-full max-w-[400px] px-gutter" id="message-panel">
<div class="glass-panel rounded-2xl p-8 text-center relative overflow-hidden">
<!-- Decorative corner elements -->
<div class="absolute top-4 left-4 w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.8)]"></div>
<div class="absolute top-4 right-4 w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.8)]"></div>
<div class="absolute bottom-4 left-4 w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.8)]"></div>
<div class="absolute bottom-4 right-4 w-1 h-1 bg-tertiary rounded-full shadow-[0_0_8px_rgba(233,195,73,0.8)]"></div>
<span class="material-symbols-outlined text-secondary text-4xl mb-4 opacity-80" style="font-variation-settings: 'FILL' 0;">auto_awesome</span>
<h2 class="font-headline-md text-tertiary mb-3" id="constellation-title">Constellation Name</h2>
<p class="font-body-md text-on-surface/90 leading-relaxed italic" id="constellation-message">The message will appear here when a star is clicked.</p>
<button class="mt-6 font-label-caps text-outline hover:text-primary transition-colors tracking-widest text-[10px] uppercase" id="close-panel">Close</button>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const panel = document.getElementById('message-panel');
            const titleEl = document.getElementById('constellation-title');
            const msgEl = document.getElementById('constellation-message');
            const closeBtn = document.getElementById('close-panel');
            
            let starCount = 0;
            const counterEl = document.getElementById('star-counter');
            const toastEl = document.getElementById('toast-notification');
            let toastTimeout;

            // Listen for the custom event from Three.js scene
            window.addEventListener('constellation-clicked', (event) => {
                const detail = event.detail || {};
                const name = detail.name || 'Unknown Star Cluster';
                const message = detail.message || 'A silent whisper from the cosmos.';
                
                titleEl.textContent = name;
                msgEl.textContent = message;
                
                panel.classList.add('visible');
                createStarDust(event.detail.x || window.innerWidth/2, event.detail.y || window.innerHeight/2);
                
                // Update counter and show toast
                starCount++;
                counterEl.textContent = starCount;
                
                toastEl.classList.remove('opacity-0', 'translate-y-4');
                toastEl.classList.add('opacity-100', 'translate-y-0');
                
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toastEl.classList.remove('opacity-100', 'translate-y-0');
                    toastEl.classList.add('opacity-0', 'translate-y-4');
                }, 3000);
            });

            closeBtn.addEventListener('click', () => {
                panel.classList.remove('visible');
            });

            // Fallback interaction for testing if event isn't firing
            document.body.addEventListener('dblclick', (e) => {
                const mockEvent = new CustomEvent('constellation-clicked', {
                    detail: {
                        name: 'Lyra\'s Song',
                        message: 'Wishing you a universe of happiness on your special day.',
                        x: e.clientX,
                        y: e.clientY
                    }
                });
                window.dispatchEvent(mockEvent);
            });

            function createStarDust(x, y) {
                for(let i=0; i<10; i++) {
                    const dust = document.createElement('div');
                    dust.className = 'star-dust';
                    dust.style.left = (x + (Math.random() * 40 - 20)) + 'px';
                    dust.style.top = (y + (Math.random() * 40 - 20)) + 'px';
                    dust.style.animationDelay = (Math.random() * 2) + 's';
                    document.body.appendChild(dust);
                    
                    setTimeout(() => {
                        dust.remove();
                    }, 3000);
                }
            }
        });
    </script>
</body></html>
