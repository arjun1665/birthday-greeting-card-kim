<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes float-down {
            0% {
                transform: translateY(-10vh) rotate(0deg) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg) translateX(20px);
                opacity: 0;
            }
        }

        .interactive-petal {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: rgba(210, 187, 255, 0.4); /* Based on secondary token */
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.5), 0 0 10px rgba(210, 187, 255, 0.3);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
            /* Filter to give a soft, frosted look */
            backdrop-filter: blur(2px);
        }

        .interactive-petal:hover {
            transform: scale(1.2) rotate(45deg);
            box-shadow: inset 0 0 12px rgba(255, 255, 255, 0.8), 0 0 20px rgba(210, 187, 255, 0.6);
            background-color: rgba(210, 187, 255, 0.7);
        }

        .compliment-reveal {
            position: absolute;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-in-out, transform 1s ease-out;
            z-index: 30;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5), 0 0 20px rgba(210, 187, 255, 0.4);
        }

        .compliment-active {
            opacity: 1;
            transform: translate(-50%, -100%);
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(18, 20, 20, 0.4); /* surface color with opacity */
            backdrop-filter: blur(16px);
            border: 0.5px solid rgba(226, 226, 226, 0.1); /* on-surface subtle */

<!-- Container for interactive petals -->

<script>
        const compliments = [
            "You make ordinary days memorable.",
            "You make people smile.",
            "Your presence brings peace.",
            "You have a gentle spirit.",
            "Your kindness radiates like starlight.",
            "You are a quiet kind of wonderful.",
            "The world is softer with you in it."
        ];

        const container = document.getElementById('petal-container');
        const starCounterEl = document.getElementById('star-counter');
        let starsCollected = 0;
        const maxStars = 5;

        function updateStarCounter() {
            if (starsCollected <= maxStars) {
                starCounterEl.innerText = `${starsCollected} / ${maxStars} Stars Collected`;
            }
        }

        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'interactive-petal pointer-events-auto';
            
            // Randomize starting position, size, and animation duration
            const startX = Math.random() * window.innerWidth;
            const duration = 15 + Math.random() * 15; // 15s to 30s fall
            const delay = Math.random() * 5;
            const scale = 0.8 + Math.random() * 0.7;

            petal.style.left = `${startX}px`;
            petal.style.animation = `float-down ${duration}s linear ${delay}s infinite`;
            petal.style.transform = `scale(${scale}) rotate(45deg)`;

            // Interaction
            petal.addEventListener('click', (e) => {
                // Stop animation and fade out petal
                petal.style.animationPlayState = 'paused';
                petal.style.opacity = '0';
                petal.style.pointerEvents = 'none';

                // Increment star counter
                if (starsCollected < maxStars) {
                    starsCollected++;
                    updateStarCounter();
                }

                // Create compliment text
                const textEl = document.createElement('div');
                textEl.className = 'compliment-reveal font-headline-md text-headline-md text-secondary';
                textEl.style.left = `${e.clientX}px`;
                textEl.style.top = `${e.clientY}px`;
                
                // Select random compliment
                const complimentText = compliments[Math.floor(Math.random() * compliments.length)];
                textEl.innerText = complimentText;

                document.body.appendChild(textEl);

                // Trigger reflow for animation
                void textEl.offsetWidth;
                textEl.classList.add('compliment-active');

                // Cleanup
                setTimeout(() => {
                    textEl.style.opacity = '0';
                    setTimeout(() => textEl.remove(), 1000);
                    petal.remove();
                }, 4000);
            });

            container.appendChild(petal);

            // Cleanup petals that finish animation (optional, but good for long running)
            petal.addEventListener('animationiteration', () => {
                if(petal.style.opacity !== '0') {
                    // reposition slightly on iteration to vary the stream
                    petal.style.left = `${Math.random() * window.innerWidth}px`;
                }
            });
        }

        // Initially spawn a handful of interactive petals
        for(let i = 0; i < 8; i++) {
            createPetal();
        }

        // Occasionally add more
        setInterval(() => {
            if(document.querySelectorAll('.interactive-petal').length < 15) {
                createPetal();
            }
        }, 3000);

    </script>
